name: Build and Test

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      version:
        description: 'Custom version tag (optional, defaults to git tag)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm \
            gcc \
            binutils \
            make \
            genisoimage \
            qemu-system-x86 \
            gcc-multilib \
            libc6-dev-i386

      - name: Build UA-Horizon OS
        run: |
          make clean
          make all

      - name: Create ISO image
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.3.0")
          fi
          echo "Creating ISO filesystem for version: $VERSION..."
          mkdir -p build/iso_root/boot/grub

          # Copy bootloader and kernel
          cp build/boot.bin build/iso_root/boot/
          cp build/kernel.elf build/iso_root/boot/

          # Create GRUB config
          cat > build/iso_root/boot/grub/grub.cfg << EOF
          set timeout=5
          set default=0

          menuentry "UA-Horizon OS v$VERSION" {
              multiboot /boot/kernel.elf
              boot
          }
          EOF

          echo "Building ISO image..."
          genisoimage -R -b boot/boot.bin -no-emul-boot \
                     -boot-load-size 4 -boot-info-table \
                     -o ua-horizon-$VERSION.iso build/iso_root 2>/dev/null || \
          genisoimage -R -b boot/boot.bin -no-emul-boot \
                     -o ua-horizon-$VERSION.iso build/iso_root

      - name: Verify ISO
        run: |
           if [ -n "${{ inputs.version }}" ]; then
             VERSION="${{ inputs.version }}"
           else
             VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.3.0")
           fi
           echo "Verifying ISO..."
           if [ -f "ua-horizon-$VERSION.iso" ]; then
             ls -lh ua-horizon-$VERSION.iso
             file ua-horizon-$VERSION.iso
           else
             echo "ISO file not found!"
             exit 1
           fi

      - name: Test in QEMU (headless)
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.3.0")
          fi
          echo "Testing ISO in QEMU..."
          timeout 10s qemu-system-i386 -cdrom ua-horizon-$VERSION.iso \
                        -m 128M -nographic -serial mon:stdio \
                        -device isa-debug-exit,iobase=0xf4,iosize=0x04 || true

      - name: Generate build report
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.3.0")
          fi
          echo "Generating build report..."
          cat > build/build_report.txt << EOF
          UA-Horizon OS Build Report
          ==========================

          Build Time: $(date)
          Version: $VERSION
          CI/CD: GitHub Actions
          Runner: ubuntu-latest

          Build Artifacts:
          $(ls -la build/ 2>/dev/null || echo "No build files")

          ISO Info:
          $(ls -lh ua-horizon-$VERSION.iso 2>/dev/null || echo "ISO not created")

          Checksum:
          $(sha256sum ua-horizon-$VERSION.iso 2>/dev/null || echo "No ISO for checksum")

          Build Status: SUCCESS
          EOF

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/
            build_report.txt
          retention-days: 7

      - name: Upload ISO image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ua-horizon-iso
          path: ua-horizon-*.iso
          retention-days: 30

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check ASM syntax
        run: |
          for f in src/boot/*.asm; do
            nasm -f bin -o /dev/null "$f" || echo "Warning: $f has issues"
          done

      - name: Check C syntax (basic)
        run: |
          for f in $(find src -name "*.c"); do
            gcc -fsyntax-only -std=c99 -I./src/include "$f" 2>&1 | head -20 || true
          done

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: ua-horizon-iso

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ua-horizon-*.iso
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}