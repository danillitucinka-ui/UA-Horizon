name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm \
            gcc \
            binutils \
            make \
            genisoimage \
            qemu-system-x86 \
            gcc-multilib \
            libc6-dev-i386

      - name: Build bootloader
        run: |
          mkdir -p build
          nasm -f bin -o build/boot.bin src/boot/boot.asm

      - name: Build kernel (cross-compile for x86_64)
        run: |
          if command -v x86_64-elf-gcc &> /dev/null; then
            for f in src/kernel/*.c src/lib/*.c src/driver/*.c src/gui/*.c; do
              if [ -f "$f" ]; then
                fname=$(basename "$f" .c)
                x86_64-elf-gcc -c -nostdinc -nostdlib -fno-pie -ffreestanding -O2 \
                  -I./src/include -o "build/${fname}.o" "$f"
              fi
            done
            x86_64-elf-ld -T linker.ld -o build/kernel.elf build/*.o
          else
            echo "Building with native gcc for syntax check"
            for f in $(find src -name "*.c"); do
              if [ -f "$f" ]; then
                fname=$(basename "$f" .c)
                gcc -m64 -c -nostdinc -nostdlib -fno-pie -ffreestanding -O2 \
                  -I./src/include -o "build/${fname}.o" "$f" 2>&1 || true
              fi
            done
          fi

      - name: Verify build artifacts
        run: |
          ls -la build/ || echo "Build directory created"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check ASM syntax
        run: |
          for f in src/boot/*.asm; do
            nasm -f bin -o /dev/null "$f" || echo "Warning: $f has issues"
          done

      - name: Check C syntax (basic)
        run: |
          for f in $(find src -name "*.c"); do
            gcc -fsyntax-only -std=c99 -I./src/include "$f" 2>&1 | head -20 || true
          done