name: Build ISO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc nasm binutils xorriso mtools qemu-system-x86_64 grub-pc-bin

    - name: Build
      run: make all

    - name: Test run
      run: make run &
      sleep 10
      pkill qemu-system-x86_64 || true