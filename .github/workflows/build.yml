name: Build OS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm gcc binutils xorriso grub-pc-bin grub-common make

      - name: Build
        run: |
          make clean
          make all

      - name: Test build
        run: |
          ls -la build/
          if [ -f "build/ua-horizon.iso" ]; then
            echo "ISO built successfully!"
            ls -lh build/ua-horizon.iso
            file build/ua-horizon.iso
          else
            echo "ISO not found"
            exit 1
          fi

      - name: Upload ISO
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ua-horizon-iso
          path: build/*.iso
          retention-days: 7